# InvitaWedds Wedding Video App
# Install: sudo cp invitawedds.com.conf /etc/nginx/conf.d/invitawedds.com.conf
# Test:    sudo nginx -t && sudo systemctl reload nginx

upstream invitawedds_backend {
    server 127.0.0.1:8001;
    keepalive 32;
}

# HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name invitawedds.com www.invitawedds.com;

    return 301 https://invitawedds.com$request_uri;
}

# HTTPS application server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name invitawedds.com www.invitawedds.com;

    ssl_certificate /var/www/invitawedds/web/ssl/fullchain.pem;
    ssl_certificate_key /var/www/invitawedds/web/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /var/www/invitawedds/web/build;
    index index.html;

    client_max_body_size 50M;
    proxy_buffer_size 32k;
    proxy_buffers 8 32k;
    proxy_busy_buffers_size 64k;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;
    gzip_min_length 1024;

    # FastAPI: uploads, render jobs, health, and downloaded videos.
    location ^~ /api/ {
        proxy_pass http://invitawedds_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }

    # Cache fingerprinted frontend assets.
    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?|ttf|json)$ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # React client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
